    function getZodiacSign(longitude) {
        let normalized = longitude % 360;
        if (normalized < 0) normalized += 360;
        return SIGNS_EN[Math.floor(normalized / 30)];
    }

    function observeUniverse() {
        // 천체 엔진 로딩 안전장치
        if (typeof Astronomy === 'undefined') {
            alert("우주와 연결하는 중입니다! 1~2초만 기다렸다가 다시 눌러주세요 🚀");
            return;
        }

        const y = parseInt(document.getElementById('year').value);
        const m = parseInt(document.getElementById('month').value);
        const d = parseInt(document.getElementById('day').value);
        const h = parseInt(document.getElementById('hour').value);
        const min = parseInt(document.getElementById('minute').value);
        
        if(!y || !m || !d) return alert("날짜를 입력해주세요.");

        const area = document.getElementById('displayArea');
        area.innerHTML = ""; // 기존 결과 즉시 초기화

        const date = new Date(Date.UTC(y, m-1, d, h-9, min)); 
        
        try {
            const planets = [
                { id: "Sun", name: "태양", cat: "커리어와 자아", emoji: "☀️", dbKey: "sun" },
                { id: "Moon", name: "달", cat: "내면과 관계", emoji: "🌙", dbKey: "moon" },
                { id: "Mercury", name: "수성", cat: "소통과 지성", emoji: "💬", dbKey: "mercury" },
                { id: "Venus", name: "금성", cat: "가치관과 매력", emoji: "💖", dbKey: "venus" },
                { id: "Mars", name: "화성", cat: "열정과 텐션", emoji: "🔥", dbKey: "mars" },
                { id: "Jupiter", name: "목성", cat: "행운의 포인트", emoji: "🍀", dbKey: "jupiter" },
                { id: "Saturn", name: "토성", cat: "책임과 성숙", emoji: "🪐", dbKey: "saturn" }
            ];

            let html = "";
            planets.forEach(p => {
                const pos = Astronomy.EclipticLongitude(p.id, date);
                const sign = getZodiacSign(pos);
                const reading = (DB[p.dbKey] && DB[p.dbKey][sign]) || `${SIGN_KR[sign]}의 에너지가 관측되었습니다.`;

                html += `
                <div class="result-card">
                    <div class="card-header">
                        <div class="planet-info">
                            <span style="font-size:1.3em">${p.emoji}</span>
                            <span class="planet-name">${p.name} (${p.cat})</span>
                        </div>
                        <span class="sign-tag">${SIGN_KR[sign]}</span>
                    </div>
                    <p class="reading-body">${reading}</p>
                </div>`;
            });
            
            // 딜레이 없이 즉각적으로 화면에 뿌리기
            area.innerHTML = html;
            
        } catch (e) {
            console.error(e);
            area.innerHTML = "<p style='color: #ff6b6b; text-align: center; margin-top: 20px;'>별자리 궤도를 계산하는 중 문제가 발생했습니다. 날짜를 다시 확인해 주세요.</p>";
        }
    }
