<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trelawney | 나의 우주 관측소 🔮</title>
    <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
    <style>
        :root { --bg-color: #05070a; --card-bg: #0f141d; --accent: #7d5fff; --text-main: #e1e1e1; --text-dim: #a0a0a0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px 15px; min-height: 100vh; background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #05070a 70%); background-attachment: fixed; }
        .container { width: 100%; max-width: 480px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; margin-top: 10px; }
        h1 { font-size: 2.2em; margin: 0; letter-spacing: 3px; color: var(--accent); text-shadow: 0 0 15px rgba(125, 95, 255, 0.4); }
        .tagline { font-size: 0.85em; color: var(--text-dim); margin-top: 8px; letter-spacing: 1px; }
        .input-section { background: var(--card-bg); padding: 24px 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 15px 35px rgba(0,0,0,0.4); margin-bottom: 25px; }
        .input-grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-bottom: 15px; }
        .input-grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-bottom: 20px; }
        .input-field { display: flex; flex-direction: column; width: 100%; }
        label { font-size: 0.75em; color: var(--text-dim); margin-bottom: 6px; padding-left: 4px; }
        input, select { background: #1a1f29; border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px 5px; border-radius: 12px; font-size: 0.95em; text-align: center; -webkit-appearance: none; width: 100%; font-family: inherit; }
        input:focus, select:focus { outline: none; border-color: var(--accent); }
        select { background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a0a0a0' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 8px center; background-size: 0.9em; padding-right: 20px; }
        button { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; width: 100%; font-size: 1.1em; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(125, 95, 255, 0.2); }
        button:active { transform: scale(0.98); }
        .result-card { background: var(--card-bg); padding: 20px; border-radius: 18px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.03); animation: slideUp 0.4s ease-out; }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .planet-info { display: flex; align-items: center; gap: 8px; }
        .planet-name { font-size: 0.85em; color: var(--text-dim); font-weight: 500; }
        .sign-tag { background: rgba(125, 95, 255, 0.15); color: var(--accent); padding: 4px 10px; border-radius: 8px; font-size: 0.75em; font-weight: 700; }
        .reading-body { line-height: 1.6; font-size: 0.95em; color: #d0d0d0; margin: 0; word-break: keep-all; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>TRELAWNEY</h1>
        <div class="tagline">나의 우주, 우리 은하 관측소</div>
    </header>

    <div class="input-section">
        <div class="input-grid-3">
            <div class="input-field"><label>Year</label><input type="number" id="year" value="1990"></div>
            <div class="input-field"><label>Month</label><input type="number" id="month" value="5"></div>
            <div class="input-field"><label>Day</label><input type="number" id="day" value="27"></div>
        </div>
        <div class="input-grid-2">
            <div class="input-field"><label>Hour (KST)</label><select id="hour"></select></div>
            <div class="input-field"><label>Minute</label><select id="minute"><option value="0">00분</option><option value="30">30분</option></select></div>
        </div>
        <button onclick="observeUniverse()">운명의 차트 관측하기</button>
    </div>
    <div id="displayArea"></div>
</div>

        opt.value = i; opt.innerHTML = i + "시";

        hourSelect.appendChild(opt);
    }
